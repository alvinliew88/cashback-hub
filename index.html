<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AL Cashback Record</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px; overscroll-behavior-y: none; height: 100vh; overflow-y: auto; }
        .max-w-md { max-width: 28rem; margin: 0 auto; padding-bottom: 2.5rem; }
        .header-title { font-size: 1.5rem; font-weight: bold; letter-spacing: -0.025em; margin-bottom: 1.5rem; }
        .space-y-5 > * + * { margin-top: 1.25rem; }
        .card { background: #1a1a1a; padding: 1rem; border-radius: 12px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="max-w-md">
        <h1 class="header-title">Cashback Record</h1>
        <div class="space-y-5">
            
            <!-- 最新记录区：您可以直接在此添加 -->
            <div class="card">
                <h3>2026-06-26</h3>
                <p>消费项目：[填写商户名称]</p>
                <p>消费金额：RM XX.XX</p>
                <p>现金回馈：RM X.XX</p>
            </div>
            
            <!-- 历史记录区 -->
            <div class="card">
                <h3>历史记录</h3>
                <ul>
                    <li>2026-06-01: 示例消费 - RM 5.00 回馈</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
